<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediGro Interactive Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen antialiased">

    <!-- APP CONTAINER -->
    <div class="max-w-md mx-auto min-h-screen bg-slate-800 shadow-2xl p-6 relative flex flex-col justify-between" style="display: block;">
        
        <!-- HEADER -->
        <div class="text-center border-b border-slate-700 pb-4 mb-6">
            <h1 class="text-2xl font-black tracking-wider text-teal-400">MEDIGRO BEYOND</h1>
            <p class="text-xs text-slate-400 mt-1">Edukasi Interaktif Kesehatan & Lingkungan</p>
        </div>

        <!-- DYNAMIC INTERFACE -->
        <div id="main-interface" class="flex-grow py-2">
            <!-- Konten di-render dinamis oleh JavaScript -->
            <div class="text-center py-12 text-slate-400 font-medium">Memuat Sistem Aplikasi...</div>
        </div>

        <!-- FOOTER CREDIT -->
        <div class="text-center text-[10px] text-slate-500 pt-6 border-t border-slate-700 mt-8">
            Kreativitas Mahasiswa KKN Gedong Tengen &copy; 2026
        </div>
    </div>

    <script>
        // 1. DATA BANK MOCKUP (Fallback Otomatis Tanpa Kendala CORS Lokal)
        const dataGame = [
            {
                id: "medika_01",
                kategori: "Kesehatan Dasar",
                tipe: "kuis",
                pertanyaan: "Berapa lama durasi minimal mencuci tangan menggunakan sabun yang direkomendasikan oleh WHO?",
                opsi_a: "5 Detik saja yang penting basah",
                opsi_b: "Minimal 20 Detik dengan air mengalir",
                opsi_c: "Tepat 2 Menit sampai busa hilang",
                jawaban: "B",
                penjelasan: "Mencuci tangan minimal 20 detik secara merata terbukti secara klinis mampu meluruhkan dinding lipid virus dan mematikan bakteri patogen."
            },
            {
                id: "agro_01",
                kategori: "Kelestarian Lingkungan",
                tipe: "kuis",
                pertanyaan: "Manakah jenis sampah di bawah ini yang membutuhkan waktu hingga ratusan tahun agar dapat terurai secara alami di dalam tanah?",
                opsi_a: "Kulit buah pisang dan sisa sayuran",
                opsi_b: "Kertas koran dan kardus bekas",
                opsi_c: "Kantong plastik dan botol air mineral",
                jawaban: "C",
                penjelasan: "Sampah plastik bersifat non-biodegradable karena memiliki ikatan karbon rantai panjang yang sulit dipecah oleh mikroorganisme tanah."
            },
            {
                id: "agro_02",
                kategori: "Aktivitas Lingkungan",
                tipe: "tantangan",
                pertanyaan: "ZONA TANTANGAN FISIK: Cari 1 buah sampah anorganik (plastik/kaleng) di area sekitar ruang bermain sekarang, lalu buang ke tempat sampah terdekat!",
                opsi_a: "", opsi_b: "", opsi_c: "", jawaban: "",
                penjelasan: "Aksi nyata sekecil apa pun sangat berarti untuk kebersihan lingkungan Gedong Tengen!"
            }
        ];

        // 2. PARSING ROUTER ENGINE
        const urlParams = new URLSearchParams(window.location.search);
        const targetId = urlParams.get('id');
        const root = document.getElementById('main-interface');

        function initApp() {
            if (!targetId) {
                renderSimulationDashboard();
                return;
            }
            const activeData = dataGame.find(item => item.id === targetId);
            if (!activeData) {
                renderErrorScreen();
            } else if (activeData.tipe === 'kuis') {
                renderQuizScreen(activeData);
            } else {
                renderChallengeScreen(activeData);
            }
        }

        // 3. UI RENDER FUNCTIONS
        function renderSimulationDashboard() {
            let html = `
                <div class="bg-slate-700/50 p-4 rounded-xl border border-slate-600 mb-6">
                    <h3 class="text-sm font-bold text-amber-400 mb-2">[Mode Simulasi Developer]</h3>
                    <p class="text-xs text-slate-300">URL parameter ID tidak ditemukan. Pilih salah satu ID di bawah untuk mensimulasikan hasil pindaian QR Code papan fisik:</p>
                </div>
                <div class="space-y-3">
            `;
            dataGame.forEach(item => {
                const badgeColor = item.id.startsWith('medika') ? 'bg-teal-500/20 text-teal-300' : 'bg-green-500/20 text-green-300';
                html += `
                    <button onclick="window.location.search = '?id=${item.id}'" class="w-full text-left bg-slate-700 p-3 rounded-lg hover:bg-slate-600 border border-slate-600 transition flex justify-between items-center">
                        <div>
                            <div class="font-semibold text-sm text-white">${item.id}</div>
                            <div class="text-xs text-slate-400 truncate max-w-[250px]">${item.pertanyaan}</div>
                        </div>
                        <span class="text-[10px] px-2 py-0.5 rounded font-mono ${badgeColor}">${item.tipe}</span>
                    </button>
                `;
            });
            html += `</div>`;
            root.innerHTML = html;
        }

        function renderQuizScreen(data) {
            const isMedika = data.id.startsWith('medika');
            const accentBg = isMedika ? 'bg-teal-600' : 'bg-emerald-600';
            const accentText = isMedika ? 'text-teal-400' : 'text-emerald-400';

            root.innerHTML = `
                <div class="mb-4">
                    <span class="text-xs font-bold uppercase tracking-wider px-2 py-1 rounded bg-slate-700 ${accentText}">${data.kategori}</span>
                </div>
                <h2 class="text-lg font-bold text-white leading-snug mb-6">${data.pertanyaan}</h2>
                
                <div class="space-y-3" id="options-block">
                    <button onclick="checkAnswer('A', '${data.jawaban}', '${btoa(data.penjelasan)}')" class="w-full text-left p-3 rounded-lg bg-slate-700 border border-slate-600 hover:bg-slate-600 font-medium text-sm transition">A. ${data.opsi_a}</button>
                    <button onclick="checkAnswer('B', '${data.jawaban}', '${btoa(data.penjelasan)}')" class="w-full text-left p-3 rounded-lg bg-slate-700 border border-slate-600 hover:bg-slate-600 font-medium text-sm transition">B. ${data.opsi_b}</button>
                    <button onclick="checkAnswer('C', '${data.jawaban}', '${btoa(data.penjelasan)}')" class="w-full text-left p-3 rounded-lg bg-slate-700 border border-slate-600 hover:bg-slate-600 font-medium text-sm transition">C. ${data.opsi_c}</button>
                </div>

                <div id="feedback-block" class="hidden mt-6 p-4 rounded-xl border transition-all duration-300 animate-fadeIn"></div>
            `;
        }

        function renderChallengeScreen(data) {
            root.innerHTML = `
                <div class="mb-4">
                    <span class="text-xs font-bold uppercase tracking-wider px-2 py-1 rounded bg-amber-500/20 text-amber-400">${data.kategori}</span>
                </div>
                <div class="bg-amber-500/10 border border-amber-500/30 p-4 rounded-xl mb-6 text-center">
                    <p class="text-sm text-slate-200 font-medium leading-relaxed">${data.pertanyaan}</p>
                </div>
                <button onclick="showChallengeExplanation('${btoa(data.penjelasan)}')" class="w-full py-3 bg-amber-500 text-slate-900 font-bold rounded-lg shadow-lg hover:bg-amber-400 transition text-sm">Selesai Melakukan Tantangan</button>
                <div id="feedback-block" class="hidden mt-6 p-4 rounded-xl border border-slate-600 bg-slate-700/50"></div>
            `;
        }

        function renderErrorScreen() {
            root.innerHTML = `
                <div class="text-center py-8">
                    <div class="text-red-500 text-4xl font-bold mb-2">404</div>
                    <p class="text-sm text-slate-300">ID Kartu / Soal tidak terdaftar dalam sistem.</p>
                    <button onclick="window.location.search=''" class="mt-6 px-4 py-2 bg-slate-700 rounded-md text-xs hover:bg-slate-600">Kembali ke Dasbor</button>
                </div>
            `;
        }

        // 4. LOGIC HANDLERS
        window.checkAnswer = function(selected, correct, encodedExplanation) {
            const block = document.getElementById('feedback-block');
            const explanation = atob(encodedExplanation);
            
            // Matikan tombol agar tidak bisa diklik ulang
            const buttons = document.querySelectorAll('#options-block button');
            buttons.forEach(btn => btn.disabled = true);

            if (selected === correct) {
                block.className = "mt-6 p-4 rounded-xl border border-green-500/30 bg-green-500/10 text-green-300 block";
                block.innerHTML = `<div class="font-bold text-sm flex items-center mb-1"><span class="mr-2">&#9989;</span> JAWABAN BENAR! (+1 Poin / Maju 1 Langkah)</div><p class="text-xs text-slate-300 leading-relaxed mb-0 mt-2">${explanation}</p>`;
            } else {
                block.className = "mt-6 p-4 rounded-xl border border-red-500/30 bg-red-500/10 text-red-300 block";
                block.innerHTML = `<div class="font-bold text-sm flex items-center mb-1"><span class="mr-2">&#10060;</span> JAWABAN KURANG TEPAT! (Penalti Sesuai Aturan)</div><p class="text-xs text-slate-300 leading-relaxed mb-0 mt-2"><strong class="text-slate-200">Kunci: ${correct}</strong> - ${explanation}</p>`;
            }
        };

        window.showChallengeExplanation = function(encodedExplanation) {
            const block = document.getElementById('feedback-block');
            block.className = "mt-6 p-4 rounded-xl border border-blue-500/30 bg-blue-500/10 text-blue-300 block";
            block.innerHTML = `<div class="font-bold text-sm mb-1">&#10024; Edukasi Tambahan:</div><p class="text-xs text-slate-300 leading-relaxed mb-0">${atob(encodedExplanation)}</p>`;
        };

        window.onload = initApp;
    </script>
</body>
</html>
